services:
  # Letta's PostgreSQL (with pgvector)
  letta_db:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_USER: letta
      POSTGRES_PASSWORD: letta
      POSTGRES_DB: letta
    volumes:
      - letta_pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letta"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Letta Server
  letta_server:
    build:
      context: .
      dockerfile: Dockerfile.letta
    depends_on:
      letta_db:
        condition: service_healthy
    ports:
      - "8283:8283"
    environment:
      - LETTA_PG_URI=postgresql://letta:letta@letta_db:5432/letta
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - MONGO_HOST=${MONGO_HOST}
      - MONGO_PORT=${MONGO_PORT:-27017}
      - MONGO_DB=${MONGO_DB:-astrotalk}
    restart: unless-stopped

  # Streamlit App
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    depends_on:
      - letta_server
    ports:
      - "8501:8501"
    environment:
      - LETTA_BASE_URL=http://letta_server:8283
      - LLM_MODEL=${LLM_MODEL:-gemini/gemini-2.5-flash}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-letta/letta-free}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
      - MONGO_HOST_EXTERNAL=${MONGO_HOST}
      - MONGO_PORT=${MONGO_PORT:-27017}
      - MONGO_DB=${MONGO_DB:-astrotalk}

volumes:
  letta_pgdata:
